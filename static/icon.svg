<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" fill="#FDF8F5" rx="96"/>
  <!-- Outer border ring -->
  <rect x="24" y="24" width="464" height="464" fill="none" stroke="#E8B4BC" stroke-width="6" rx="76"/>
  <!-- Inner border ring -->
  <rect x="40" y="40" width="432" height="432" fill="none" stroke="#E8B4BC" stroke-width="1.5" stroke-dasharray="8 6" rx="64"/>
  <!-- Couple initials -->
  <text x="256" y="310"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="210"
        font-style="italic"
        text-anchor="middle"
        fill="#C4687A"
        letter-spacing="-8">D&amp;W</text>
  <!-- Decorative top dot -->
  <circle cx="256" cy="80" r="5" fill="#E8B4BC"/>
  <!-- Decorative bottom dot -->
  <circle cx="256" cy="432" r="5" fill="#E8B4BC"/>
</svg>
